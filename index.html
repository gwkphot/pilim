<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tea Stories</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&family=Montserrat:wght@800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#fff;
    color:#111;
}

/* =====================
   NAV
===================== */

.nav{
    position:fixed;
    top:55px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:28px;
    z-index:10;
}

.item{
    width:190px;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
}

.nav button{
    width:190px;
    height:190px;
    border:none;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.nav img{
    width:70%;
    height:70%;
    object-fit:contain;
    filter:brightness(0);
}

.tea{ background:#EF6634; }
.wood{ background:#DDE42C; }
.instruments{ background:#7A78FF; }
.music{ background:#00D94A; }

.title{
    display:block;
    margin-top:18px;
    width:190px;
    font-family:"Montserrat",sans-serif;
    font-weight:800;
    font-size:25px;
    line-height:.95;
    color:#111;

    opacity:0;
    transform:translateY(10px);
    transition:.25s;
}

.item.active .title{
    opacity:1;
    transform:translateY(0);
}

/* =====================
   CONTENT (DESKTOP)
===================== */

.content{
    position:absolute;
    top:430px;
    left:50%;
    transform:translateX(-50%);
    width:100%;
}

.card{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    opacity:0;
    pointer-events:none;
}

.card p{
    font-family:"Inter",sans-serif;
    font-size:30px;
    line-height:1.45;
    max-width:900px;
    padding-left:100px;
}

/* =====================
   TABLET
===================== */

@media (max-width: 1024px){

    .nav button,
    .item{
        width:140px;
    }

    .nav button{
        height:140px;
    }

    .title{
        width:140px;
        font-size:20px;
    }

    .card p{
        font-size:24px;
        padding-left:60px;
    }

    .content{
        top:360px;
    }
}

/* =====================
   PHONE FIX (главное)
===================== */

@media (max-width: 768px){

    html, body{
        overflow:auto;
    }

    .nav{
        position:fixed;
        top:20px;
        left:20px;
        transform:none;
        flex-direction:column;
        gap:16px;
    }

    .nav button{
        width:70px;
        height:70px;
    }

    .title{
        opacity:1;
        transform:none;
        font-size:16px;
        margin-top:8px;
        width:auto;
    }

    .content{
        position:relative;
        top:auto;
        left:auto;
        transform:none;
        margin-top:220px;
        padding:0 20px;
    }

    .card{
        position:relative;
        left:auto;
        transform:none;
        opacity:0;
        pointer-events:none;
        transition:opacity .3s ease;
    }

    .card.active{
        opacity:1;
        pointer-events:auto;
    }

    .card p{
        font-size:18px;
        padding-left:0;
        max-width:100%;
    }
}

</style>

</head>

<body>

<div class="nav">

    <div class="item">
        <button class="tea"><img src="images/tea.svg"></button>
        <div class="title">Пьём чай</div>
    </div>

    <div class="item">
        <button class="wood"><img src="images/wood.svg"></button>
        <div class="title">Делаем классные деревяшки</div>
    </div>

    <div class="item">
        <button class="instruments"><img src="images/instruments.svg"></button>
        <div class="title">Строим музыкальные инструменты</div>
    </div>

    <div class="item">
        <button class="music"><img src="images/music.svg"></button>
        <div class="title">Играем музыку</div>
    </div>

</div>

<div class="content">

    <div class="card"><p>Пауза — настройка слуха...</p></div>
    <div class="card"><p>Дерево дышит...</p></div>
    <div class="card"><p>Гравитон и звук...</p></div>
    <div class="card"><p>Общая музыка...</p></div>

</div>

<script>

const items = document.querySelectorAll(".item");
const cards = document.querySelectorAll(".card");

let active = null;

function setActive(index){

    items.forEach(i=>i.classList.remove("active"));
    items[index].classList.add("active");

    cards.forEach((card,i)=>{

        if(i===index){

            gsap.to(card,{
                opacity:1,
                duration:.4,
                pointerEvents:"auto"
            });

            card.classList.add("active");

        } else {

            gsap.to(card,{
                opacity:0,
                duration:.25,
                pointerEvents:"none"
            });

            card.classList.remove("active");
        }
    });
}

items.forEach((item,index)=>{
    item.addEventListener("mouseenter",()=>{
        if(window.innerWidth <= 768) return;
        setActive(index);
    });

    item.addEventListener("click",()=>{
        setActive(index);
    });
});

setActive(0);

</script>

</body>
</html>
